<!DOCTYPE html>
<html lang="en">

        <title>Add Course</title>
        <link rel="stylesheet" href="task.css">
    </head>
    <body>
        <header>
            <nav>
                <h2>Course Organizer</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="page2.html">My Courses</a></li>
                    <li><a href="page3.html">Add Course</a></li>
                    <li><a href="page4.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1><u>Add Course</u></h1>
            <form>
                <label for="name">Course Name:</label>
                <input id="name" type="text" required placeholder="Enter Course Name" name="name" value="ok">

                <label for="in">Instructor:</label>
                <input id="in" type="text" required placeholder="Enter Instructor" name="instructor" value="ok">

                <label for="ho">Credit Hours:</label>
                <input id="ho" type="number" placeholder="Enter Credit Hours" name="Credit Hours" value="done">

                <label for="notes">Notes:</label>
                <textarea id="notes"  placeholder="Enter any notes" name="Notes" value="done"></textarea>
                <br>

                <button type="submit">Add</button>  
            </form>
        </main>
        <footer>

        </footer>
    </body>
